version: '3.8'

services:
  postgres:
    image: postgres:13
    container_name: hive-metastore-db
    environment:
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
      POSTGRES_DB: metastore
    ports:
      - "5433:5432"
    volumes:
      - metastore-db:/var/lib/postgresql/data
    networks:
      - lakehouse

  hive-metastore:
    image: apache/hive:3.1.3
    container_name: hive-metastore
    depends_on:
      - postgres
    environment:
      SERVICE_NAME: metastore
      HIVE_METASTORE_DB_TYPE: postgres
      HIVE_METASTORE_DB_HOSTNAME: postgres
      HIVE_METASTORE_DB_NAME: metastore
      HIVE_METASTORE_DB_USER: hive
      HIVE_METASTORE_DB_PASSWORD: hive
    ports:
      - "9083:9083"
    volumes:
      - ./warehouse:/opt/hive/data/warehouse
    networks:
      - lakehouse

  trino:
    image: trinodb/trino:351
    container_name: trino
    depends_on:
      - hive-metastore
    ports:
      - "8080:8080"
    volumes:
      - ./trino/etc:/etc/trino
      - ./warehouse:/opt/hive/data/warehouse
    networks:
      - lakehouse

  superset:
    build:
      context: ./superset
    container_name: superset
    depends_on:
      - trino
    ports:
      - "8088:8088"
    environment:
      SUPERSET_SECRET_KEY: "supersecretkey"
    volumes:
      - superset_home:/app/superset_home
    command: >
      /bin/sh -c "
      superset db upgrade &&
      superset fab create-admin
      --username admin
      --firstname Admin
      --lastname User
      --email admin@demo.com
      --password admin || true &&
      superset init &&
      superset run -h 0.0.0.0 -p 8088
      "
    networks:
      - lakehouse

volumes:
  metastore-db:
  superset_home:

networks:
  lakehouse: